model:
  target: michelangelo.models.tsal.sal_pl_module.ShapeAsLatentPLModule
  params:
    learning_rate: 1.e-4
    module_cfg:
      target: michelangelo.models.tsal.sal_perceiver.ShapeAsLatentPerceiver
      params:
        num_latents: 256
        embed_dim: 64
        point_feats: 3
        num_freqs: 8
        include_pi: false
        heads: 12
        width: 768
        num_encoder_layers: 8
        num_decoder_layers: 16
        use_ln_post: true
        init_scale: 0.25
        qkv_bias: false
        use_checkpoint: true

    loss_cfg:
      target: michelangelo.models.tsal.loss.KLNearFar
      params:
        near_weight: 0.1
        kl_weight: 0.001
        num_near_samples: 1024

    optimizer_cfg:
      optimizer:
        target: torch.optim.AdamW
        params:
          betas: [0.9, 0.99]
          eps: 1.e-6
          weight_decay: 1.e-2

      scheduler:
        target: michelangelo.utils.trainings.lr_scheduler.LambdaWarmUpCosineFactorScheduler
        params:
          warm_up_steps: 5000
          f_start: 1.e-6
          f_min: 1.e-3
          f_max: 1.0

data:
  target: michelangelo.data.tallinn_npz.TallinnNPZDataModule
  params:
    data_root: /home/kemove/devdata1/ljr/dataset/Tallinn/michelangelo_npz
    batch_size: 8
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    drop_last_train: true

    train_transform:
      feature_selection:
        target: michelangelo.data.transforms.FeatureSelection
        params:
          surface_feature_type: watertight_normal
      random_sample:
        target: michelangelo.data.transforms.SplitRandomSample
        params:
          use_surface_sample: true
          num_surface_samples: 4096
          num_volume_samples: 1024
          num_near_samples: 1024
      to_tensor:
        target: michelangelo.data.transforms.ToTensor
        params:
          tensor_keys: [surface, geo_points]
      axis_scale:
        target: michelangelo.data.transforms.AxisScaleTransform
        params:
          interval: [0.9, 1.1]
          jitter: true
          jitter_scale: 0.005

    val_transform:
      feature_selection:
        target: michelangelo.data.transforms.FeatureSelection
        params:
          surface_feature_type: watertight_normal
      random_sample:
        target: michelangelo.data.transforms.SplitRandomSample
        params:
          use_surface_sample: true
          num_surface_samples: 4096
          num_volume_samples: 1024
          num_near_samples: 1024
      to_tensor:
        target: michelangelo.data.transforms.ToTensor
        params:
          tensor_keys: [surface, geo_points]

    test_transform:
      feature_selection:
        target: michelangelo.data.transforms.FeatureSelection
        params:
          surface_feature_type: watertight_normal
      random_sample:
        target: michelangelo.data.transforms.SplitRandomSample
        params:
          use_surface_sample: true
          num_surface_samples: 4096
          num_volume_samples: 1024
          num_near_samples: 1024
      to_tensor:
        target: michelangelo.data.transforms.ToTensor
        params:
          tensor_keys: [surface, geo_points]

trainer:
  experiment_name: tallinn-shapevae-256
  output_dir: runs
  accelerator: auto
  devices: auto
  strategy: auto
  precision: 32
  max_epochs: 200
  log_every_n_steps: 20
  val_check_interval: 1.0
  limit_val_batches: 1.0
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  monitor: val/total_loss
  monitor_mode: min
  save_top_k: 3
